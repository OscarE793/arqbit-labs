<div class="group bg-surface-container rounded-2xl overflow-hidden transition-all duration-300 hover:bg-surface-container-high hover:-translate-y-2 hover:shadow-card-hover">
  <!-- Image -->
  <div class="relative h-52 overflow-hidden">
    <img [src]="service.imageUrl" [alt]="service.name"
         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
    <div class="absolute inset-0 bg-gradient-to-t from-surface-container via-surface-container/30 to-transparent"></div>
    <div class="absolute top-4 left-4">
      <span class="bg-background/80 backdrop-blur-sm text-on-surface text-[11px] font-label font-semibold px-3 py-1.5 rounded-full uppercase tracking-wider">
        {{ service.category }}
      </span>
    </div>
    <button (click)="toggleFavorite($event)"
            [attr.aria-label]="isFavorite ? 'Quitar de favoritos' : 'Agregar a favoritos'"
            class="absolute top-4 right-4 w-10 h-10 rounded-full flex items-center justify-center transition-all backdrop-blur-sm"
            [class]="isFavorite ? 'bg-primary text-on-primary' : 'bg-background/70 text-on-surface-variant hover:text-primary'">
      <span class="material-symbols-outlined text-xl" [class.filled]="isFavorite">favorite</span>
    </button>
  </div>

  <!-- Content -->
  <div class="p-6">
    <h3 class="font-headline font-bold text-xl text-on-surface mb-2 tracking-tight group-hover:text-primary transition-colors">
      {{ service.name }}
    </h3>
    <p class="text-on-surface-variant text-sm font-body mb-5 line-clamp-2 leading-relaxed">
      {{ service.description }}
    </p>

    <div class="flex flex-wrap gap-2 mb-5">
      <span *ngFor="let tag of (service.techTags || []).slice(0, 3)"
            class="text-[10px] font-label font-medium px-2 py-1 rounded bg-surface-container-highest text-on-surface-variant uppercase tracking-wide">
        {{ tag }}
      </span>
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-outline-variant/30">
      <div class="flex flex-col">
        <span class="text-[10px] font-label text-on-surface-variant uppercase tracking-widest">Desde</span>
        <span class="font-headline font-bold text-xl text-on-surface">
          {{ formatPrice(service.price) }}
        </span>
      </div>
      <a [routerLink]="['/servicios', service.id]"
         class="gradient-cta px-4 py-2.5 rounded-full text-sm font-label font-semibold inline-flex items-center gap-1.5">
        Ver más
        <span class="material-symbols-outlined text-base">arrow_forward</span>
      </a>
    </div>
  </div>
</div>
